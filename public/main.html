    <link rel="stylesheet" type="text/css" href="../src/css/variable.css">
    <link rel="stylesheet" type="text/css" href="../src/css//Dark_theme_style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

</head> 
<body class="dark">

    <!-- <div class="mode"><div>Dark Mode </div></div> -->
    <div class="mode" id="mode"><div> </div></div>

    <!-- search modal -->
    <div class="search-modal-wrapper search-hide" id="search-modal">
      <div class="search-modal-container">
        <input 
          id="search-input"
          type="text"
          autocomplete="off" 
          placeholder="search urls or username"
           />
          <div class="results">
            <ul id="list-container">
              <!-- <li>:satisfied
                <img src="https://instagram.com/favicon.ico" alt="" srcset="./favico.ico">
                <span>Instagram.com</span>
              </li>
              <li>
                <img src="https://google.com/favicon.ico" alt="" srcset="">
                <span>Google.com</span>
              </li>
              <li>
                <img src="https://facebook.com/favicon.ico" alt="" srcset="">
                <span>Facebook.com</span>
              </li> -->
            </ul>
          </div>  
      </div> 
    </div>



    <div class="title-bar" id="title-bar">
      <div class="title-left">
        <div class="icon-container" id="icon-container">
          <img id="app-icon" alt="ico" srcset="">
        </div>
      </div>
      
      <div class="spacer"></div>

      <div class="title-center" id="title-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <span id="app_name">search</span>        
      </div>

      <div class="spacer"></div>

      <div class="title-right">

        <div class="window-cmini-maxi">
          <div class="win-minimize action-container" id="win-minimize">
            <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </div>

          <div class="win-restore-maximize">
            <div class="win-restore  action-container" id="win-restore">
              <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M15 21V9"/></svg>
            </div>

            <div class="win-maximize  action-container" id="win-maximize">
              <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            </div>
          </div>

          <div class="win-close action-container" id="win-close">
            <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </div>
        </div>
      </div>
    </div>
    
    <div class="container-wrapper">
      <div class="container" id="container">
        <div class="form-container get-pass-container">
          <form action="#" id="clipboard-form">
            <div class="url-username-logo">
              <h1>Get Back Your Pass-code</h1> 
              <img id="clipboard-url-logo" src="" alt="" srcset="./favico.ico"> 
            </div>  
            <span>or use your url / Username </span>
            <input id="c-urlInput" type="text" name="url" placeholder="Url"/>
            <input id="c-usernameInput" type="text" name="username" placeholder="Username"/>

            <div class="password-container">
              <input id="c-passwordInput" type="password" name="password" placeholder="Password"/>
              <input id="idInput" type="hidden" name="id">
              <div class="show-hide-btn hide" id="c-show-hide-btn">
                <svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 122.88 53.37"><title>closed-eye</title><path d="M1.05,7.37A4.49,4.49,0,1,1,7.93,1.61a114.61,114.61,0,0,0,14.88,15C35.48,27,48.63,32.25,61.67,32.24S87.79,27,100.37,16.49A112.38,112.38,0,0,0,114.94,1.64a4.48,4.48,0,0,1,6.92,5.69,129.09,129.09,0,0,1-10,10.85l5.91,5.42a4.47,4.47,0,1,1-6,6.6l-6.59-6a86.1,86.1,0,0,1-13.43,9.06l3.73,8A4.48,4.48,0,0,1,87.35,45l-3.74-8a61.24,61.24,0,0,1-17.56,4V48.9a4.48,4.48,0,0,1-8.95,0V41A61.75,61.75,0,0,1,39.58,37l-3.76,8a4.48,4.48,0,1,1-8.11-3.79l3.74-8A88.78,88.78,0,0,1,18,24.2l-6.55,6a4.47,4.47,0,1,1-6-6.6l5.83-5.34A130.63,130.63,0,0,1,1.05,7.37Z"/></svg>
              </div>
            </div>

            <button id="clipboard">Clipboard</button>
          </form>
        </div>
        <div class="form-container save-pass-container">
          <form id="save-form" action="#">     
            <div class="url-username-logo">
              <h1>Save Your Pass-code </h1> 
              <img id="save-url-logo" src="" alt="" srcset="./favico.ico"> 
            </div>

            <input id="save-url-in" type="text" name="url" placeholder="Url" />
            <input id="save-username-in" type="text" name="username" placeholder="Username" />
            
                  
            
              <div class="password-container">
                <input id="save-password-in" type="password" name="password" placeholder="Password" />
                <div class="show-hide-btn hide" id="show-hide-btn">
                  <svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 122.88 53.37"><title>closed-eye</title><path d="M1.05,7.37A4.49,4.49,0,1,1,7.93,1.61a114.61,114.61,0,0,0,14.88,15C35.48,27,48.63,32.25,61.67,32.24S87.79,27,100.37,16.49A112.38,112.38,0,0,0,114.94,1.64a4.48,4.48,0,0,1,6.92,5.69,129.09,129.09,0,0,1-10,10.85l5.91,5.42a4.47,4.47,0,1,1-6,6.6l-6.59-6a86.1,86.1,0,0,1-13.43,9.06l3.73,8A4.48,4.48,0,0,1,87.35,45l-3.74-8a61.24,61.24,0,0,1-17.56,4V48.9a4.48,4.48,0,0,1-8.95,0V41A61.75,61.75,0,0,1,39.58,37l-3.76,8a4.48,4.48,0,1,1-8.11-3.79l3.74-8A88.78,88.78,0,0,1,18,24.2l-6.55,6a4.47,4.47,0,1,1-6-6.6l5.83-5.34A130.63,130.63,0,0,1,1.05,7.37Z"/></svg>
                </div>
              </div>

              

            <button id="save">Save</button>
          </form>
        </div>
        <div class="overlay-container">
          <div class="overlay">
            <div class="overlay-panel overlay-left">
              <div class="img">
                <img src="./lock-icon/lock-1.png" alt="" srcset="">
              </div>
              <p>Preparing your password for secure clipboard retrieval.</p>
              <button class="ghost" id="save-slide">Save</button>
            </div>
            <div class="overlay-panel overlay-right">
              <div class="img">
                <img src="./lock-icon/password.png" alt="" srcset="">
              </div>
              <p>Securely saving your password with encryption for easy and safe access. And
                Enter your personal details and start journey with us</p>
              <button class="ghost" id="clipboard-slide" disabled>clipboard</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    </div> -->

    <script defer src="../src/js/savingData.js"></script>

</body>
